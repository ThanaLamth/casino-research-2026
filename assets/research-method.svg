<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Casino review research workflow</title>
  <desc id="desc">Four-step workflow covering official sources, access checks, bonus analysis, and draft assembly.</desc>
  <rect width="1600" height="900" fill="#f7f3ec"/>
  <text x="90" y="110" fill="#17293a" font-size="48" font-family="Georgia, serif">Research Workflow Used for the Draft</text>
  <g font-family="Arial, sans-serif">
    <rect x="90" y="190" width="300" height="520" rx="28" fill="#17384a"/>
    <text x="130" y="255" fill="#f7f3ec" font-size="28" font-weight="700">1. Official Sources</text>
    <text x="130" y="315" fill="#d8e3e6" font-size="22">Product pages</text>
    <text x="130" y="355" fill="#d8e3e6" font-size="22">Rewards pages</text>
    <text x="130" y="395" fill="#d8e3e6" font-size="22">Help and payment docs</text>
    <text x="130" y="435" fill="#d8e3e6" font-size="22">State-availability guides</text>

    <rect x="450" y="190" width="300" height="520" rx="28" fill="#406071"/>
    <text x="490" y="255" fill="#f7f3ec" font-size="28" font-weight="700">2. Access Check</text>
    <text x="490" y="315" fill="#eef3f4" font-size="22">US proxy geo test</text>
    <text x="490" y="355" fill="#eef3f4" font-size="22">Homepage availability</text>
    <text x="490" y="395" fill="#eef3f4" font-size="22">Challenge / 403 notes</text>
    <text x="490" y="435" fill="#eef3f4" font-size="22">Jurisdiction caveats</text>

    <rect x="810" y="190" width="300" height="520" rx="28" fill="#7e9ba6"/>
    <text x="850" y="255" fill="#17293a" font-size="28" font-weight="700">3. Review Frame</text>
    <text x="850" y="315" fill="#203746" font-size="22">Bonus friction</text>
    <text x="850" y="355" fill="#203746" font-size="22">Rewards value</text>
    <text x="850" y="395" fill="#203746" font-size="22">Withdrawal guidance</text>
    <text x="850" y="435" fill="#203746" font-size="22">Responsible gaming</text>

    <rect x="1170" y="190" width="300" height="520" rx="28" fill="#c79c5e"/>
    <text x="1210" y="255" fill="#17293a" font-size="28" font-weight="700">4. Draft Output</text>
    <text x="1210" y="315" fill="#382912" font-size="22">Quick verdict</text>
    <text x="1210" y="355" fill="#382912" font-size="22">Per-brand writeups</text>
    <text x="1210" y="395" fill="#382912" font-size="22">Comparison table</text>
    <text x="1210" y="435" fill="#382912" font-size="22">Source notes</text>
  </g>
</svg>
